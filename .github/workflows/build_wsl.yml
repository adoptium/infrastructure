name: Windows Playbook Checker

defaults:
  run:
    shell: wsl-bash {0}

on:
  pull_request:
    paths:
    - .github/workflows/build_wsl.yml
    - ansible/playbooks/AdoptOpenJDK_Windows_Playbook/**
    branches:
    - master

# Cancel existing runs if user makes another push.
concurrency:
  group: "${{ github.ref }}"
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  build-wsl:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-2022, windows-2025]
    name: Windows
    runs-on: ${{ matrix.os }}
    steps:
    - name: Setup WinRM and Password (checksum verified)
      shell: powershell
      run: |
        Set-LocalUser -Name "runneradmin" -Password (ConvertTo-SecureString -AsPlainText "Ansible_password123!" -Force)
        New-NetFirewallRule -DisplayName "ALLOW TCP PORT 5986" -Direction inbound -Profile Any -Action Allow -LocalPort 5986 -Protocol TCP
        Invoke-WebRequest https://raw.githubusercontent.com/ansible/ansible-documentation/devel/examples/scripts/ConfigureRemotingForAnsible.ps1 -OutFile .\ConfigureRemotingForAnsible.ps1
        $expectedChecksum = "EBA72DF06E3E77709595F75D1D5B4D95B06602429DD2A3F7867406DF875B0C70"
        $actualChecksum = Get-FileHash -Path ".\ConfigureRemotingForAnsible.ps1" -Algorithm SHA256 | Select-Object -ExpandProperty Hash
        if ($actualChecksum -ne $expectedChecksum) {
            Write-Output "Checksum mismatch"
            Write-Output "Actual Checksum: $actualChecksum"
            Write-Output "Expect Checksum: $expectedChecksum"
            exit 1
        } else {
            .\ConfigureRemotingForAnsible.ps1 -CertValidityDays 9999
            .\ConfigureRemotingForAnsible.ps1 -EnableCredSSP
            .\ConfigureRemotingForAnsible.ps1 -ForceNewSSLCert
            .\ConfigureRemotingForAnsible.ps1 -SkipNetworkProfileCheck
        }

    - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

    - uses: Vampire/setup-wsl@f40fb59d850112c9a292b0218bca8271305b9127 # v5.0.0
      with:
        distribution: Ubuntu-24.04
        wsl-version: 1

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt install -y ansible

    # Prep only on Windows 2025: install VC++ redists required by msdia140.dll
    - name: Prep DIA deps (Windows 2025 only)
      if: ${{ runner.os == 'Windows' && matrix.os == 'windows-2025' }}
      shell: pwsh
      run: |
        $ErrorActionPreference = 'Stop'
        function Have([string]$p) { Test-Path $p }
        $x64 = "$env:WINDIR\System32\vcruntime140.dll"
        $x86 = "$env:WINDIR\SysWOW64\vcruntime140.dll"
        if ((Have $x64) -and (Have $x86)) {
          Write-Host "VC++ 2015–2022 redists already present (x64 + x86)."
          return
        }
        # 1) Try winget (preferred on GH runners)
        $winget = (Get-Command winget -ErrorAction SilentlyContinue)?.Source
        if ($winget) {
          if (-not (Have $x64)) {
            & $winget install --id "Microsoft.VCRedist.2015+.x64" --silent --accept-package-agreements --accept-source-agreements --disable-interactivity || $null
          }
          if (-not (Have $x86)) {
            & $winget install --id "Microsoft.VCRedist.2015+.x86" --silent --accept-package-agreements --accept-source-agreements --disable-interactivity || $null
          }
          Start-Sleep 2
        }

        # 2) Fallback to official Microsoft installers if anything still missing
        if (-not (Have $x64) -or -not (Have $x86)) {
          $tmp = Join-Path $env:TEMP 'vcredist'; New-Item -ItemType Directory -Force -Path $tmp | Out-Null
          if (-not (Have $x64)) {
            $x64Url = 'https://aka.ms/vs/17/release/vc_redist.x64.exe'
            $x64Exe = Join-Path $tmp 'vc_redist.x64.exe'
            Invoke-WebRequest -Uri $x64Url -OutFile $x64Exe -UseBasicParsing
            Start-Process -FilePath $x64Exe -ArgumentList '/quiet /norestart' -Wait
          }
          if (-not (Have $x86)) {
            $x86Url = 'https://aka.ms/vs/17/release/vc_redist.x86.exe'
            $x86Exe = Join-Path $tmp 'vc_redist.x86.exe'
            Invoke-WebRequest -Uri $x86Url -OutFile $x86Exe -UseBasicParsing
            Start-Process -FilePath $x86Exe -ArgumentList '/quiet /norestart' -Wait
          }
        }

        if ((Have $x64) -and (Have $x86)) {
          Write-Host "VC++ 2015–2022 redists present (x64 + x86)."
        } else {
          Write-Warning "VC++ 2015–2022 redists not fully present; Ansible registration may still fail."
        }

    - name: Setup Hosts file
      working-directory: ansible
      run: |
        rm -f playbooks/AdoptOpenJDK_Windows_Playbook/hosts.win
        cat <<EOF > playbooks/AdoptOpenJDK_Windows_Playbook/hosts.win
        [windows]
        127.0.0.1
        [windows:vars]
        ansible_user=runneradmin
        ansible_password=Ansible_password123!
        ansible_become=false
        EOF
        sed -i -e "s/.*hosts:.*/  hosts: all/g" playbooks/AdoptOpenJDK_Windows_Playbook/main.yml

    - name: Run Ansible Playbook
      working-directory: ansible
      run: |
        export ANSIBLE_CONFIG=./ansible.cfg
        # Skip MSVS_2013 until https://github.com/adoptium/infrastructure/issues/2178 is fixed
        # Windows 2025 runner already has MSVS_2022 installed so will be skipped in the playbook execution.
        ansible-playbook -i playbooks/AdoptOpenJDK_Windows_Playbook/hosts.win --extra-vars 'git_sha=${{ github.sha }}' -b --skip-tags adoptopenjdk,jenkins,MSVS_2013,MSVS_2019 reboot playbooks/AdoptOpenJDK_Windows_Playbook/main.yml
