# ---------------------------------------------------------------
# GitHub Actions workflow for Jenkins agent provisioning (macOS)
# ---------------------------------------------------------------
#
# The GitHub Actions Cloud plugin triggers this workflow via
# workflow_dispatch, passing the Jenkins URL, agent name, and
# agent secret as inputs.
# ---------------------------------------------------------------

# A full list of software installed on the macOS runner can be found here:
# https://github.com/actions/runner-images/blob/main/images/macos/macos-15-Readme.md

name: Jenkins Agent (macOS)

on:
  workflow_dispatch:
    inputs:
      jenkins_url:
        description: 'Jenkins server URL (with trailing slash)'
        required: true
      agent_name:
        description: 'Jenkins agent name'
        required: true
      agent_secret:
        description: 'Jenkins agent secret'
        required: true

jobs:
  agent:
    runs-on: macos-15-intel
    timeout-minutes: 360   # max 6 hours, adjust as needed

    steps:
      - name: Mask secret
        run: |
          secret=$(jq -r '.inputs.agent_secret' "$GITHUB_EVENT_PATH")
          echo "::add-mask::$secret"

      - name: Configure networking
        run: |
          # Ensure the runner's hostname resolves (fixes compiler control
          # MethodMatcherTest / Klass failures that rely on local socket
          # connections during JVM startup)
          HNAME=$(hostname)
          if ! dscacheutil -q host -a name "$HNAME" | grep -q ip_address; then
            echo "127.0.0.1 $HNAME" | sudo tee -a /etc/hosts
            echo "::1       $HNAME" | sudo tee -a /etc/hosts
          fi

          # GHA macOS runners use Apple Virtualization.framework; the en0
          # vmnet adapter does not forward multicast, so route multicast
          # through lo0 where loopback delivery works reliably.

          # IPv4: delete the pre-existing en0 multicast route, then add via lo0
          sudo route -n delete -net 224.0.0.0/4 || true
          sudo route -n add    -net 224.0.0.0/4 -interface lo0

          # IPv6: delete any pre-existing en0 multicast route, then add via lo0
          sudo route -n delete -inet6 -net ff00::/8 || true
          sudo route -n add    -inet6 -net ff00::/8 -interface lo0

          # Disable the application-level firewall so test JVMs can accept
          # inbound connections without an interactive allow/deny dialog
          sudo /usr/libexec/ApplicationFirewall/socketfilterfw --setglobalstate off || true

          # Diagnostic: print routes for troubleshooting
          echo "--- IPv4 multicast route ---"
          netstat -rn -f inet  | grep -E '224|multicast' || true
          echo "--- IPv6 multicast route ---"
          netstat -rn -f inet6 | grep -i 'ff00\|multicast' || true

      - name: Upgrade bash
        run: |
          brew install bash
          sudo bash -c 'echo /usr/local/bin/bash >> /etc/shells'
          sudo dscl . -change /Users/runner UserShell /bin/bash /usr/local/bin/bash
          echo "/usr/local/bin" >> "$GITHUB_PATH"
          echo "SHELL=/usr/local/bin/bash" >> "$GITHUB_ENV"
          echo "BASH=/usr/local/bin/bash" >> "$GITHUB_ENV"
          /usr/local/bin/bash --version

      - name: Install ant-contrib
        run: |
          ANT_LIB="$(ant -diagnostics | grep 'ant.home' | head -1 | sed 's/.*: //')/lib"
          curl -sSfL --retry 3 --retry-delay 5 -o /tmp/ant-contrib-${ANT_CONTRIB_VERSION}-bin.tar.gz \
            "https://sourceforge.net/projects/ant-contrib/files/ant-contrib/ant-contrib-${ANT_CONTRIB_VERSION}/ant-contrib-${ANT_CONTRIB_VERSION}-bin.tar.gz"
          tar xzf /tmp/ant-contrib-${ANT_CONTRIB_VERSION}-bin.tar.gz -C /tmp
          cp /tmp/ant-contrib/lib/ant-contrib.jar "$ANT_LIB/"
          rm -rf /tmp/ant-contrib /tmp/ant-contrib-${ANT_CONTRIB_VERSION}-bin.tar.gz
        env:
          ANT_CONTRIB_VERSION: 1.0b2

      - name: Download Jenkins agent JAR
        run: |
          curl -sSfL --retry 3 --retry-delay 5 -o agent.jar \
            "${{ inputs.jenkins_url }}jnlpJars/agent.jar"

      - name: Connect to Jenkins
        env:
          AGENT_SECRET: ${{ inputs.agent_secret }}
        run: |
          java -jar agent.jar \
            -url "${{ inputs.jenkins_url }}" \
            -secret "$AGENT_SECRET" \
            -name "${{ inputs.agent_name }}" \
            -workDir "/Users/runner/agent" \
            -noReconnect
