---
# This playbook runs the ansible/machine_audit/backend/main.py script on the
# target host (Nagios server for now)
# The script collects machine_info.json files from all nodes via SCP
# and saves them in {{ backend_dir }}/collectedInfo
# Some portions generated by IBM Bob

- name: Collection machine_info.json files from all nodes
  hosts: all
  gather_facts: yes
  # become: yes
  # become_user: nagios

  vars:
    backend_dir: "/home/nagios/machine_audit"
    script_dir: "{{ playbook_dir }}"

  tasks:
    - name: Display target host
      debug:
        msg: "Running backend script on: {{ inventory_hostname }}"

    - name: Ensure Python 3 is installed
      package:
        name: python3
        state: present

    - name: Create machiine_audit directory
      file:
        path: "{{ backend_dir }}"
        state: directory
        mode: '0755'
        owner: nagios
        group: nagios

    - name: Copy scripts to remote host
      copy:
        src: "{{ item }}"
        dest: "{{ backend_dir }}/{{ item | basename }}"
        mode: '0755'
        owner: nagios
        group: nagios
      loop:
        - "{{ script_dir }}/main.py"
        - "{{ script_dir }}/getNodeList.py"

    - name: Check if .env file exists in target directory
      stat:
        path: "{{ backend_dir }}/.env"
      register: env_file

    - name: Fail if .env file is not present
      fail:
        msg: |
          .env file not found at {{ backend_dir }}/.env. Create one with the following format:
          url=<jenkins_url>:80
          username=<jenkins_username>
          password=<jenkins_api_token>
      when: not env_file.stat.exists

    - name: Run main.py
      command: python3 {{ backend_dir }}/main.py
      args:
        chdir: "{{ backend_dir }}"

    - name: Check collected machine_info.json files
      find:
        paths: "{{ backend_dir }}/collectedInfo"
        patterns: "*_machine_info.json"
      register: collected_files

    - name: Display collection summary
      debug:
        msg: "Collected {{ collected_files.files | length }} machine_info.json files in {{ backend_dir }}/collectedInfo"
