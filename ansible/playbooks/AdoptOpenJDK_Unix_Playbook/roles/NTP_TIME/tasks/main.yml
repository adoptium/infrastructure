---
############
# NTP_TIME #
############

- name: Set timedatectl set-ntp no
  command: timedatectl set-ntp no
  when:
    - (ansible_distribution == "RedHat" and ansible_distribution_major_version == "7") or
      (ansible_distribution == "Ubuntu" and ansible_distribution_major_version < "20") or
      ((ansible_distribution == "SLES" or ansible_distribution == "openSUSE") and ansible_distribution_major_version == "12") or
      (ansible_distribution == "centos" and ansible_distribution_major_version == "7")
  tags: ntp_time

- name: Configure NTP server pools for older Ubuntu (< 20)
  shell: "cat /etc/ntp.conf | grep '1.pool.ntp.org' && echo NTP || echo -e 'pool 1.pool.ntp.org\npool 2.pool.ntp.org\npool 3.pool.ntp.org' >> /etc/ntp.conf"
  when:
    - ansible_distribution == "Ubuntu" and ansible_distribution_major_version < "20"
  tags:
    - ntp_time
    - skip_ansible_lint

- name: Configure chrony server pools for Ubuntu 20+
  lineinfile:
    path: /etc/chrony/chrony.conf
    line: "{{ item }}"
    state: present
  loop:
    - "pool 1.pool.ntp.org iburst"
    - "pool 2.pool.ntp.org iburst"
    - "pool 3.pool.ntp.org iburst"
  when:
    - ansible_distribution == "Ubuntu" and ansible_distribution_major_version >= "20"
  tags: ntp_time

- name: Start NTP for older Ubuntu (< 20) and SLES 11
  service:
    name: ntp
    state: restarted
    enabled: yes
  when:
    - (ansible_distribution == "Ubuntu" and ansible_distribution_major_version < "20") or
      (ansible_distribution == "SLES" and ansible_distribution_major_version == "11")
  tags: ntp_time

- name: Start chrony for Ubuntu 20+
  service:
    name: chrony
    state: restarted
    enabled: yes
  when:
    - ansible_distribution == "Ubuntu" and ansible_distribution_major_version >= "20"
  tags: ntp_time

- name: Gather Facts About The Services Present
  service_facts:
  tags: ntp_time

- name: Check If NTPD Exists In The Service Facts
  set_fact:
    ntpd_entry_exists: "{{ 'ntpd.service' in services }}"
  when: ansible_facts.services is defined
  tags: ntp_time

- name: Set Fact Where NTPD Is Not Available As A Service
  set_fact:
    ntpd_entry_exists: "false"
  when: ansible_facts.services is not defined
  tags: ntp_time

- name: Display NTPD Status
  debug:
    var: ntpd_entry_exists
  when:
    - (ansible_distribution == "RedHat" and (ansible_distribution_major_version | int < 8)) or
      (ansible_distribution == "SLES" and ansible_distribution_major_version == "12") or
      (ansible_distribution == "CentOS" and ansible_distribution_major_version == "7" )
  tags: ntp_time

- name: Start NTP for RedHat, SLES 12 and CentOS 7
  service:
    name: ntpd
    state: restarted
    enabled: yes
  when:
    - ntpd_entry_exists | default(false) | bool
    - (ansible_distribution == "RedHat" and (ansible_distribution_major_version | int < 8)) or
      (ansible_distribution == "SLES" and ansible_distribution_major_version == "12") or
      (ansible_distribution == "CentOS" and ansible_distribution_major_version == "7" )
  tags: ntp_time

- name: Start NTP for SUSE12
  service:
    name: ntp.service
    state: restarted
    enabled: yes
  when:
    - (ansible_distribution == "openSUSE" and ansible_distribution_major_version == "12")
    - ansible_architecture == "x86_64"
  tags: ntp_time

- name: Start chronyd for RHEL8+ and SLES15
  service:
    name: chronyd
    state: restarted
    enabled: yes
  when:
    - (ansible_distribution == "RedHat" and (ansible_distribution_major_version | int >= 8)) or
      (ansible_distribution == "SLES" and ansible_distribution_major_version == "15")
  tags: ntp_time
