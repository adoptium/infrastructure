---
# This playbook runs platform/windows.ps1 on Windows machines
# Then copies the created machine_info.json to the local host before
# forwarding it to the nagios user
# Some portions generated by IBM Bob

- name: Run platform/windows.ps1 on Windows machines
  hosts: all
  gather_facts: yes

  vars:
    script_dir: "{{ playbook_dir }}/platform"
    packages_dir: "{{ playbook_dir }}/packages"
    remote_temp_dir: "C:\\temp\\machine_audit"
    output_file: "C:\\machine_info.json"
    nagios_user: "78.47.239.96"
    nagios_host: "nagios"
    nagios_scp_dir: "/home/nagios/machine_info_files"

  tasks:
    - name: Run Run platform/windows.ps1 on Windows machines
      vars:
        ansible_port: 5986,
        ansible_connection: "winrm"
        ansible_winrm_server_cert_validation: "ignore"
      block:
      - name: Detect operating system
        set_fact:
          is_windows: "{{ ansible_os_family == 'Windows' }}"

      - name: Display detected OS
        debug:
          msg: "Detected OS: {{ ansible_os_family }} (Windows: {{ is_windows }})"

      - name: Fail if not Windows
        fail:
          msg: "This playbook is designed for Windows hosts only"
        when: not is_windows

      - name: Create temporary directory on remote machine
        win_file:
          path: "{{ item }}"
          state: directory
        with_items:
          - "{{ remote_temp_dir }}"
          - "{{ remote_temp_dir }}\\packages"

      # Copy Windows script and packages
      - name: Copy Windows audit script to remote machine
        win_copy:
          src: "{{ script_dir }}/windows.ps1"
          dest: "{{ remote_temp_dir }}\\windows.ps1"

      - name: Copy Windows packages file to remote machine
        win_copy:
          src: "{{ packages_dir }}/windows"
          dest: "{{ remote_temp_dir }}\\packages\\windows"

      # Execute the PowerShell script
      - name: Execute Windows audit script
        win_shell: |
          Set-Location "{{ remote_temp_dir }}"
          powershell.exe -ExecutionPolicy Bypass -File "{{ remote_temp_dir }}\\windows.ps1"
        register: windows_result
        ignore_errors: yes

      # Display results
      - name: Display Windows script output
        debug:
          var: windows_result.stdout_lines
        when: windows_result is defined

      - name: Display Windows script errors (if any)
        debug:
          var: windows_result.stderr_lines
        when: windows_result is defined and windows_result.stderr_lines | length > 0

      # Check if output file was created
      - name: Check if machine_info.json was created
        win_stat:
          path: "{{ output_file }}"
        register: output_file_stat

      - name: Display file creation status
        debug:
          msg: "machine_info.json {{ 'created successfully at ' + output_file if output_file_stat.stat.exists else 'was NOT created' }}"

      # Fetch machine_info.json to local host
      - name: Fetch machine_info.json to local machine
        fetch:
          src: "{{ output_file }}"
          dest: "{{ playbook_dir }}/collected_machine_info/{{ inventory_hostname }}_machine_info.json"
          flat: yes
        when: output_file_stat.stat.exists

      # Clean up temporary directory
      - name: Clean up temporary directory
        win_file:
          path: "{{ remote_temp_dir }}"
          state: absent
        when: output_file_stat.stat.exists

    # Transfer machine_info.json to Nagios server via SCP
    - name: Transfer machine_info.json to Nagios server
      vars:
        ansible_port: 22
        ansible_connection: ssh
      command: >
        scp {{ playbook_dir }}/collected_machine_info/{{ inventory_hostname }}_machine_info.json
        {{ nagios_user }}@{{ nagios_host }}:{{ nagios_scp_dir }}
      delegate_to: localhost
      when: output_file_stat.stat.exists
      register: scp_result
      tags: scp_transfer

    - name: Remove local machine_info.json file
      file:
        path: "{{ playbook_dir }}/collected_machine_info/{{ inventory_hostname }}_machine_info.json"
        state: absent
      delegate_to: localhost
      when: output_file_stat.stat.exists and scp_result.rc == 0
