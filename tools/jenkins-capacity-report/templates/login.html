<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Jenkins Capacity Report</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 400px;
            padding: 40px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 8px;
        }

        .login-header p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: #333;
            font-weight: 500;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .login-button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .login-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .login-button:active {
            transform: translateY(0);
        }

        .login-button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .alert-error {
            background: #fee;
            color: #c33;
            border: 1px solid #fcc;
        }

        .alert-success {
            background: #efe;
            color: #3c3;
            border: 1px solid #cfc;
        }

        .alert-info {
            background: #eef;
            color: #33c;
            border: 1px solid #ccf;
        }

        .loading {
            display: none;
            text-align: center;
            margin-top: 10px;
            color: #666;
            font-size: 14px;
        }

        .loading.active {
            display: block;
        }

        .footer-links {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
        }

        .footer-links a {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
        }

        .footer-links a:hover {
            text-decoration: underline;
        }

        .rbac-status {
            text-align: center;
            margin-top: 20px;
            padding: 12px;
            background: #f5f5f5;
            border-radius: 8px;
            font-size: 13px;
            color: #666;
        }

        .rbac-status.disabled {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeaa7;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>🔐 Login</h1>
            <p>Jenkins Capacity Report</p>
        </div>

        <div id="alert-container"></div>

        <form id="login-form">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required autocomplete="username" autofocus>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required autocomplete="current-password">
            </div>

            <button type="submit" class="login-button" id="login-button">
                Sign In
            </button>

            <div class="loading" id="loading">
                Authenticating...
            </div>
        </form>

        <div class="footer-links">
            <a href="{{ url_for('index') }}">← Back to Dashboard</a>
        </div>

        <div class="rbac-status" id="rbac-status">
            Checking RBAC status...
        </div>
    </div>

    <script>
        // Check RBAC status on page load
        fetch('{{ url_for("get_rbac_status") }}')
            .then(response => response.json())
            .then(data => {
                const statusDiv = document.getElementById('rbac-status');
                if (data.rbac_enabled) {
                    statusDiv.textContent = '🔒 RBAC is enabled';
                    statusDiv.classList.remove('disabled');
                } else {
                    statusDiv.textContent = '⚠️ RBAC is disabled - Authentication not required';
                    statusDiv.classList.add('disabled');
                }
            })
            .catch(error => {
                console.error('Error checking RBAC status:', error);
            });

        // Handle login form submission
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const button = document.getElementById('login-button');
            const loading = document.getElementById('loading');
            const alertContainer = document.getElementById('alert-container');

            // Clear previous alerts
            alertContainer.innerHTML = '';

            // Disable button and show loading
            button.disabled = true;
            loading.classList.add('active');

            try {
                const response = await fetch('{{ url_for("login") }}', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    // Store token in localStorage
                    localStorage.setItem('auth_token', data.token);
                    localStorage.setItem('username', data.user.username);
                    localStorage.setItem('user_role', data.user.role);

                    // Also set cookie for page requests (expires in 8 hours)
                    const expires = new Date();
                    expires.setHours(expires.getHours() + 8);
                    document.cookie = `auth_token=${data.token}; path=/; expires=${expires.toUTCString()}; SameSite=Lax`;

                    // Show success message
                    showAlert('success', `Welcome, ${data.user.username}! Redirecting...`);

                    // Redirect to dashboard after short delay
                    setTimeout(() => {
                        const returnUrl = new URLSearchParams(window.location.search).get('return') || '{{ url_for("index") }}';
                        window.location.href = returnUrl;
                    }, 1000);
                } else {
                    // Show error message
                    showAlert('error', data.error || data.message || 'Login failed');
                    button.disabled = false;
                    loading.classList.remove('active');
                }
            } catch (error) {
                console.error('Login error:', error);
                showAlert('error', 'Network error. Please try again.');
                button.disabled = false;
                loading.classList.remove('active');
            }
        });

        function showAlert(type, message) {
            const alertContainer = document.getElementById('alert-container');
            const alert = document.createElement('div');
            alert.className = `alert alert-${type}`;
            alert.textContent = message;
            alertContainer.appendChild(alert);
        }

        // Check if already logged in
        const token = localStorage.getItem('auth_token');
        if (token) {
            // Verify token is still valid
            fetch('{{ url_for("get_current_user_info") }}', {
                headers: {
                    'Authorization': `Bearer ${token}`
                }
            })
            .then(response => {
                if (response.ok) {
                    // Already logged in, redirect to dashboard
                    const returnUrl = new URLSearchParams(window.location.search).get('return') || '{{ url_for("index") }}';
                    window.location.href = returnUrl;
                }
            })
            .catch(error => {
                // Token invalid, clear it
                localStorage.removeItem('auth_token');
                localStorage.removeItem('username');
                localStorage.removeItem('user_role');
            });
        }
    </script>
</body>
</html>
