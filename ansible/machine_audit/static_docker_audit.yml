---
# This playbook executes the platform/linux.py script on static docker containers
# running on linux dockerhost machines

# Some portions generated by IBM Bob

- name: Audit Docker Containers with aqa_ Images
  hosts: all
  become: yes
  gather_facts: yes
  
  vars:
    script_dir: "{{ playbook_dir }}/platform"
    packages_dir: "{{ playbook_dir }}/packages"
    remote_temp_dir: "/tmp/machine_audit"
    container_temp_dir: "/tmp/machine_audit"
    output_dir: "/tmp/container_audits"
  
  tasks:
    
    - name: Check if Docker is available
      command: docker --version
      register: docker_check
      ignore_errors: yes
      changed_when: false
    
    - name: Fail if Docker is not available
      fail:
        msg: "Docker is not available on this host"
      when: docker_check.rc != 0
    
    - name: Get list of running containers with aqa_ in image name
      shell: |
        docker ps --format '{% raw %}{{.ID}} {{.Image}}{% endraw %}' | awk '/^[^ ]+ aqa_/ {print $1}'
      register: aqa_containers
      changed_when: false
      failed_when: false
    
    - name: Display found containers
      debug:
        msg: "Found {{ aqa_containers.stdout_lines | length }} container(s) with 'aqa_' in image name"
    
    - name: Create temporary directory on host
      file:
        path: "{{ remote_temp_dir }}"
        state: directory
        mode: '0755'
      when: aqa_containers.stdout_lines | length > 0
    
    - name: Copy linux.py script to host
      copy:
        src: "{{ script_dir }}/linux.py"
        dest: "{{ remote_temp_dir }}/linux.py"
        mode: '0755'
      when: aqa_containers.stdout_lines | length > 0

    - name: Create packages directory on remote
      file:
        path: "{{ remote_temp_dir }}/packages"
        state: directory
        mode: '0755'
      when: aqa_containers.stdout_lines | length > 0
    
    - name: Copy packages file to host
      copy:
        src: "{{ packages_dir }}/linux"
        dest: "{{ remote_temp_dir }}/packages/linux"
        mode: '0644'
      when: aqa_containers.stdout_lines | length > 0
    
    - name: Run the linux.py script on each static docker container
      shell: |
        CONTAINER_ID="{{ item }}"
        CONTAINER_NAME=$(docker inspect --format='{% raw %}{{.Name}}{% endraw %}' ${CONTAINER_ID} | sed 's/\///')
        CONTAINER_IMAGE=$(docker inspect --format='{% raw %}{{.Config.Image}}{% endraw %}' ${CONTAINER_ID})
        
        echo "Auditing container: ${CONTAINER_NAME} (${CONTAINER_ID}) - Image: ${CONTAINER_IMAGE}"
        
        # Create temp directory in container
        docker exec ${CONTAINER_ID} mkdir -p {{ container_temp_dir }}/packages || true
        
        # Copy script and packages to container
        docker cp {{ remote_temp_dir }}/linux.py ${CONTAINER_ID}:{{ container_temp_dir }}/linux.py
        docker cp {{ remote_temp_dir }}/packages/linux ${CONTAINER_ID}:{{ container_temp_dir }}/packages/linux
        
        # Make script executable
        docker exec ${CONTAINER_ID} chmod +x {{ container_temp_dir }}/linux.py
        
        # Run the audit script
        docker exec ${CONTAINER_ID} python3 {{ container_temp_dir }}/linux.py || \
        docker exec ${CONTAINER_ID} python {{ container_temp_dir }}/linux.py || true
        
        # Copy the output file from container to host
        docker cp ${CONTAINER_ID}:/var/log/machine_info.json {{ output_dir }}/${CONTAINER_NAME}_machine_info.json 2>/dev/null || \
        echo "Warning: Could not retrieve machine_info.json from ${CONTAINER_NAME}"
        
        echo "Completed audit for ${CONTAINER_NAME}"
        echo "---"
      loop: "{{ aqa_containers.stdout_lines }}"
      register: audit_results
      when: aqa_containers.stdout_lines | length > 0
      ignore_errors: yes
    
    - name: Display audit results
      debug:
        var: audit_results
      when: aqa_containers.stdout_lines | length > 0
    
    - name: List generated audit files
      find:
        paths: "{{ output_dir }}"
        patterns: "*_machine_info.json"
      register: audit_files
      when: aqa_containers.stdout_lines | length > 0
    
    - name: Display audit file locations
      debug:
        msg: "Audit files saved to {{ output_dir }}: {{ audit_files.files | map(attribute='path') | list }}"
      when: aqa_containers.stdout_lines | length > 0 and audit_files.matched > 0
    
    - name: Clean up temporary directory on host
      file:
        path: "{{ remote_temp_dir }}"
        state: absent
      when: aqa_containers.stdout_lines | length > 0
    
    - name: Summary
      debug:
        msg: 
          - "Audit complete!"
          - "Containers audited: {{ aqa_containers.stdout_lines | length }}"
          - "Output directory: {{ output_dir }}"
          - "Files created: {{ audit_files.matched | default(0) }}"
      when: aqa_containers.stdout_lines | length > 0
    
    - name: No containers found message
      debug:
        msg: "No running containers with 'aqa_' in image name found on this host"
      when: aqa_containers.stdout_lines | length == 0
