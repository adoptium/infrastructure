# Apache2 configuration for Jenkins Capacity Analyzer
# Place this file in /etc/apache2/sites-available/
# Enable with: sudo a2ensite jenkins-capacity.conf

<VirtualHost *:80>
    ServerName jenkins-capacity.example.com
    ServerAdmin admin@example.com

    # Redirect HTTP to HTTPS (optional but recommended)
    # Uncomment the following lines if you have SSL configured
    # RewriteEngine On
    # RewriteCond %{HTTPS} off
    # RewriteRule ^(.*)$ https://%{HTTP_HOST}$1 [R=301,L]
</VirtualHost>

<VirtualHost *:443>
    ServerName jenkins-capacity.example.com
    ServerAdmin admin@example.com

    # SSL Configuration (uncomment and configure if using HTTPS)
    # SSLEngine on
    # SSLCertificateFile /etc/ssl/certs/your-cert.crt
    # SSLCertificateKeyFile /etc/ssl/private/your-key.key
    # SSLCertificateChainFile /etc/ssl/certs/your-chain.crt

    # Application directory
    DocumentRoot /var/www/jenkins-capacity-report

    # WSGI Configuration
    WSGIDaemonProcess jenkins_capacity \
        user=www-data \
        group=www-data \
        threads=5 \
        python-home=/var/www/jenkins-capacity-report/venv \
        python-path=/var/www/jenkins-capacity-report \
        home=/var/www/jenkins-capacity-report
    
    WSGIScriptAlias / /var/www/jenkins-capacity-report/wsgi.py
    
    WSGIProcessGroup jenkins_capacity
    WSGIApplicationGroup %{GLOBAL}

    # Directory permissions
    <Directory /var/www/jenkins-capacity-report>
        WSGIProcessGroup jenkins_capacity
        WSGIApplicationGroup %{GLOBAL}
        Require all granted
    </Directory>

    # Static files (if needed in future)
    # Alias /static /var/www/jenkins-capacity-report/static
    # <Directory /var/www/jenkins-capacity-report/static>
    #     Require all granted
    # </Directory>

    # Logging
    ErrorLog ${APACHE_LOG_DIR}/jenkins-capacity-error.log
    CustomLog ${APACHE_LOG_DIR}/jenkins-capacity-access.log combined
    LogLevel info

    # Security headers
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-XSS-Protection "1; mode=block"
</VirtualHost>

# Alternative: Serve from a subdirectory instead of a separate domain
# Uncomment and modify the following if you want to serve from /jenkins-capacity
#
# WSGIDaemonProcess jenkins_capacity \
#     user=www-data \
